# SimCLR method configuration

name: simclr

# Training hyperparameters
epochs: 200
batch_size: 256
lr: 0.0003
weight_decay: 1e-4

# SimCLR specific
temperature: 0.07
projection_dim: 128
n_views: 2

# Augmentation strength
augmentation_strength: 1.0

# Learning rate schedule
warmup_epochs: 10
scheduler: cosine  # cosine annealing

# Logging
log_every_n_steps: 100


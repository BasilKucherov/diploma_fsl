# SimCLR test configuration for quick validation

name: simclr_test

# Reduced training hyperparameters for testing
epochs: 2
batch_size: 32
lr: 0.0003
weight_decay: 1e-4

# SimCLR specific
temperature: 0.07
projection_dim: 128
n_views: 2

# Augmentation strength
augmentation_strength: 1.0

# Learning rate schedule
warmup_epochs: 0
scheduler: cosine

# Logging
log_every_n_steps: 10

